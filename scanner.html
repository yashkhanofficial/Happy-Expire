<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/@zxing/library@latest"></script>
</head>
<body>
    <div class="container">
        <a href="dashboard.html">← Back</a>
        <h1>Scan Barcode</h1>
        <div id="scanner-container">
            <video id="video" width="100%"></video>
        </div>
        <div class="card">
            <input type="text" id="manual-barcode" placeholder="Manual Barcode Input">
            <button id="btn-search" class="btn-secondary">Search</button>
        </div>
        <div id="scan-result" class="card" style="display:none;">
            <h2 id="res-name"></h2>
            <p>Total Stock: <b id="res-stock"></b></p>
            <div id="res-batches"></div>
            <button id="btn-sell-now" class="btn-primary">Sell 1 Unit (FIFO)</button>
        </div>
    </div>
    <script type="module" src="js/scanner.js"></script>
</body>
</html>
