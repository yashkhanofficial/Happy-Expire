<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Expire - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="card">
            <h1>⌛ Happy Expire</h1>
            <p>Inventory & Expiry Tracker</p>
            <div id="auth-form">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <button id="btn-login" class="btn-primary">Login</button>
                <button id="btn-signup" class="btn-secondary">Create Account</button>
            </div>
            <p id="auth-error" class="text-error"></p>
        </div>
    </div>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
