<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Happy Expire</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <span class="logo">Happy Expire</span>
        <button id="btn-logout">Logout</button>
    </nav>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">Total Products: <span id="stat-products">0</span></div>
            <div class="stat-card">Total Stock: <span id="stat-stock">0</span></div>
        </div>

        <h2>Expiry Alerts</h2>
        <div class="alert-section">
            <h3 class="text-critical">🔴 Critical (3 Days)</h3>
            <div id="list-3-days" class="alert-list"></div>
            
            <h3 class="text-warning">🟡 Warning (7 Days)</h3>
            <div id="list-7-days" class="alert-list"></div>
            
            <h3 class="text-safe">🟢 Safe (30 Days)</h3>
            <div id="list-30-days" class="alert-list"></div>
        </div>

        <div class="fab-container">
            <a href="scanner.html" class="fab">📷 Scan / Sell</a>
            <a href="add-product.html" class="fab">➕ New Product</a>
            <a href="add-batch.html" class="fab">📦 Add Stock</a>
        </div>
    </div>
    <script type="module" src="js/dashboard.js"></script>
</body>
</html>
